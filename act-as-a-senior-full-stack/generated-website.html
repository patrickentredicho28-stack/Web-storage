<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generated Website Preview</title>
  <meta name="description" content="A working generated website preview rendered from Website Storage strategy data." />
  <style>
    :root {
      color-scheme: dark;
      --bg: oklch(13% 0.018 252);
      --panel: oklch(20% 0.02 252);
      --panel-2: oklch(24% 0.024 252);
      --text: oklch(94% 0.012 252);
      --muted: oklch(72% 0.03 252);
      --soft: oklch(60% 0.03 252);
      --line: oklch(100% 0.005 252 / .12);
      --accent: oklch(74% 0.13 218);
      --accent-2: oklch(78% 0.14 162);
      --warm: oklch(80% 0.13 67);
      --shadow: 0 28px 80px oklch(7% 0.02 252 / .55);
      --ease: cubic-bezier(.16, 1, .3, 1);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100dvh;
      font-family: "Aptos", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 72% -12%, oklch(58% 0.16 246 / .2), transparent 32rem),
        linear-gradient(140deg, oklch(11% 0.018 252), var(--bg) 52%, oklch(10% 0.014 252));
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(oklch(100% 0.005 252 / .035) 1px, transparent 1px),
        linear-gradient(90deg, oklch(100% 0.005 252 / .035) 1px, transparent 1px);
      background-size: 44px 44px;
      mask-image: linear-gradient(to bottom, black, transparent 78%);
      z-index: -1;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    a:focus-visible,
    button:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 4px;
    }

    .wrap {
      width: min(1180px, calc(100% - 36px));
      margin: 0 auto;
    }

    .nav {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      min-height: 76px;
      padding: 12px 0;
      backdrop-filter: blur(14px);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-weight: 800;
      letter-spacing: .01em;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 38px;
      height: 38px;
      border: 1px solid var(--line);
      border-radius: 13px;
      color: var(--accent);
      background: oklch(100% 0.005 252 / .055);
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 14px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid oklch(78% 0.12 218 / .34);
      border-radius: 999px;
      padding: 0 18px;
      color: oklch(98% 0.005 252);
      background: linear-gradient(180deg, oklch(62% 0.15 246), oklch(48% 0.13 246));
      box-shadow: 0 16px 42px oklch(46% 0.15 246 / .22);
      font-weight: 800;
      transition: transform 220ms var(--ease), filter 220ms var(--ease);
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.06);
    }

    .btn.secondary {
      border-color: var(--line);
      color: var(--text);
      background: oklch(100% 0.005 252 / .055);
      box-shadow: none;
    }

    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(320px, .75fr);
      gap: 28px;
      align-items: center;
      min-height: calc(100dvh - 96px);
      padding: 50px 0 70px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 32px;
      border: 1px solid oklch(78% 0.12 218 / .24);
      border-radius: 999px;
      padding: 0 12px;
      color: oklch(84% 0.1 218);
      background: oklch(62% 0.13 246 / .1);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 780px;
      margin: 22px 0 18px;
      font-size: clamp(46px, 7vw, 94px);
      line-height: .92;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .lead {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: clamp(17px, 2vw, 22px);
      line-height: 1.55;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 30px;
    }

    .proof-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-top: 34px;
    }

    .proof {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
      background: oklch(100% 0.005 252 / .045);
    }

    .proof strong {
      display: block;
      font-size: 24px;
    }

    .proof span {
      color: var(--soft);
      font-size: 12px;
      line-height: 1.4;
    }

    .visual {
      position: relative;
      overflow: hidden;
      min-height: 520px;
      border: 1px solid var(--line);
      border-radius: 32px;
      background:
        radial-gradient(circle at 50% 0%, oklch(74% 0.13 218 / .18), transparent 18rem),
        linear-gradient(180deg, var(--panel-2), oklch(13% 0.018 252));
      box-shadow: var(--shadow);
      padding: 24px;
    }

    .visual::after {
      content: "";
      position: absolute;
      inset: 20px;
      border: 1px solid var(--line);
      border-radius: 24px;
      pointer-events: none;
    }

    .journey {
      position: relative;
      z-index: 1;
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .journey-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: oklch(10% 0.014 252 / .66);
    }

    .journey-card span {
      display: block;
      margin-bottom: 7px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    .journey-card strong {
      font-size: 20px;
    }

    section {
      padding: 86px 0;
    }

    .section-head {
      display: grid;
      grid-template-columns: minmax(0, .8fr) minmax(260px, .45fr);
      gap: 30px;
      align-items: end;
      margin-bottom: 26px;
    }

    .section-head h2 {
      margin: 0;
      font-size: clamp(32px, 4.7vw, 64px);
      line-height: .98;
      letter-spacing: 0;
      text-wrap: balance;
    }

    .section-head p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    .framework {
      display: grid;
      gap: 14px;
    }

    .block {
      display: grid;
      grid-template-columns: 56px minmax(0, 1fr) minmax(180px, .28fr);
      gap: 18px;
      align-items: start;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 20px;
      background: linear-gradient(180deg, oklch(100% 0.005 252 / .055), oklch(100% 0.005 252 / .032));
    }

    .num {
      display: grid;
      place-items: center;
      width: 48px;
      height: 48px;
      border-radius: 16px;
      color: var(--accent);
      background: oklch(62% 0.13 246 / .12);
      font-weight: 900;
    }

    .block h3 {
      margin: 0 0 8px;
      font-size: 23px;
      line-height: 1.15;
    }

    .block p {
      margin: 0;
      color: var(--muted);
      line-height: 1.58;
    }

    .label {
      color: var(--soft);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .offer {
      display: grid;
      grid-template-columns: minmax(0, .75fr) minmax(300px, .42fr);
      gap: 22px;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 26px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .panel h2,
    .panel h3 {
      margin-top: 0;
    }

    .list {
      display: grid;
      gap: 12px;
      padding: 0;
      margin: 18px 0 0;
      list-style: none;
    }

    .list li {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr);
      gap: 10px;
      color: var(--muted);
      line-height: 1.55;
    }

    .list li::before {
      content: "";
      width: 10px;
      height: 10px;
      margin-top: 7px;
      border-radius: 999px;
      background: var(--accent-2);
    }

    .faq {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    details {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 18px;
      background: oklch(100% 0.005 252 / .045);
    }

    summary {
      cursor: pointer;
      font-weight: 800;
    }

    details p {
      color: var(--muted);
      line-height: 1.55;
    }

    .final {
      border: 1px solid oklch(78% 0.12 218 / .26);
      border-radius: 34px;
      padding: clamp(30px, 6vw, 70px);
      background:
        radial-gradient(circle at 88% 12%, oklch(74% 0.13 218 / .18), transparent 22rem),
        linear-gradient(145deg, oklch(23% 0.024 252), oklch(13% 0.018 252));
      box-shadow: var(--shadow);
    }

    .final h2 {
      max-width: 820px;
      margin: 0 0 16px;
      font-size: clamp(36px, 5vw, 72px);
      line-height: .95;
    }

    .final p {
      max-width: 680px;
      color: var(--muted);
      line-height: 1.6;
    }

    .missing {
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: 24px;
      text-align: center;
    }

    @media (max-width: 850px) {
      .nav,
      .nav-links,
      .hero-actions {
        align-items: stretch;
        flex-direction: column;
      }

      .hero,
      .section-head,
      .offer,
      .faq {
        grid-template-columns: 1fr;
      }

      .hero {
        min-height: auto;
        padding-top: 30px;
      }

      .visual {
        min-height: 420px;
      }

      .proof-row {
        grid-template-columns: 1fr;
      }

      .block {
        grid-template-columns: 1fr;
      }

      .btn {
        width: 100%;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: .001ms !important;
        animation-duration: .001ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const STORAGE_KEY = "website-storage-dashboard-v2";
    const fallbackSites = {
      "gen-coaching-001": {
        id: "gen-coaching-001",
        name: "ClaritySprint Advisory",
        niche: "Coaching",
        type: "FUNNEL",
        headline: "Turn founder overload into a calmer operating rhythm in 30 days.",
        primaryCTA: "Apply for the Clarity Sprint",
        positioningAngle: "A premium founder coaching funnel that turns scattered operators into calm weekly decision-makers through a 30-day clarity sprint.",
        sourceInspiration: "Inspired by coaching conversion patterns at a strategy level only. All naming, copy, and visual identity are original.",
        tags: ["Generated", "Premium", "Application funnel"]
      },
      "gen-law-001": {
        id: "gen-law-001",
        name: "HarborLine Case Review",
        niche: "Law Firm",
        type: "LANDING PAGE",
        headline: "Know your next legal step before the pressure builds.",
        primaryCTA: "Request a Free Case Review",
        positioningAngle: "A calm legal intake page for people who need clarity after a serious injury.",
        sourceInspiration: "Inspired by legal trust and intake patterns at a strategy level only. All naming, copy, and visual identity are original.",
        tags: ["Generated", "Trust-first", "Lead capture"]
      },
      "gen-medspa-001": {
        id: "gen-medspa-001",
        name: "LumaSkin Consult Page",
        niche: "Med Spa",
        type: "BOOKING PAGE",
        headline: "Build a skin plan before choosing the treatment.",
        primaryCTA: "Book a Skin Planning Consult",
        positioningAngle: "A consult-first med spa booking page that sells a safe treatment plan before selling a specific treatment.",
        sourceInspiration: "Inspired by consult-first med spa patterns at a strategy level only. All naming, copy, and visual identity are original.",
        tags: ["Generated", "Booking page", "Premium"]
      }
    };

    const params = new URLSearchParams(location.search);
    const id = params.get("id");
    const app = document.getElementById("app");
    const stored = safeLoad();
    const site = stored.find(item => item.id === id) || fallbackSites[id];

    if (!site) {
      app.innerHTML = `<main class="missing"><div><h1>Generated website not found.</h1><p class="lead">Return to Website Storage and open a generated card. Dynamic AutoResearch pages are loaded from saved dashboard data.</p><p><a class="btn" href="website-storage.html">Back to Website Storage</a></p></div></main>`;
    } else {
      const sections = site.generatedSections || buildSections(site);
      document.title = `${site.name} | Generated Website`;
      app.innerHTML = renderSite(site, sections);
    }

    function safeLoad() {
      try {
        return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]");
      } catch (error) {
        return [];
      }
    }

    function buildSections(site) {
      const cta = site.primaryCTA || site.cta || "Request a Consultation";
      const niche = site.niche || "Business";
      return [
        { title: "Big Promise / Desired Outcome", headline: site.headline || `${niche} visitors get one clear next step.`, body: site.positioningAngle || "A focused page built to convert visitor attention into qualified action.", cta },
        { title: "Empathy / Connection", headline: "Your best prospects are comparing options while attention is fading.", body: "The page names the hesitation, wasted follow-up, and uncertainty that keeps visitors from acting." },
        { title: "Opportunity Vehicle / Solution", headline: `The ${niche} clarity system`, body: "A structured journey explains the offer, proves trust, answers objections, and routes visitors toward action." },
        { title: "Before vs After / Gap & Bridge", headline: "From scattered interest to a confident decision.", body: "Before: visitors skim and leave. After: they understand the promise, trust the process, and know what happens after they click." },
        { title: "USP / Unique Selling Proposition", headline: "Strategy-led, not template-led.", body: "The layout mirrors proven funnel logic while using original brand, copy, CTA language, content, and visual identity." },
        { title: "Offer Positioning / No-Brainer Deal", headline: "A low-friction first step with clear value.", body: `The offer frames ${cta.toLowerCase()} as a practical next move.` },
        { title: "Social Proof / Instant Credibility", headline: "Proof placed near the decision points.", body: "Use transparent testimonials, process proof, review snippets, or sample outcomes without inventing metrics." },
        { title: "Risk Reversal / Lower The Bar", headline: "No pressure, just a useful first answer.", body: "The first action is positioned as an audit, consult, plan, or application review with clear expectations." },
        { title: "Authority / Trust The Source", headline: "Show the method behind the recommendation.", body: "Authority comes from a clear process, experience cues, standards, and visible care in the visitor journey." },
        { title: "Urgency / Take Action Today", headline: "Waiting keeps the leak open.", body: "Ethical urgency focuses on missed opportunity cost, limited implementation capacity, or timely benefit." },
        { title: "FAQ / Concerns & Objections", headline: "Answer the questions that delay action.", body: "Address timeline, fit, pricing factors, tools, handoff, revisions, and what happens after submission." },
        { title: "Final CTA", headline: `Ready to turn ${niche.toLowerCase()} interest into action?`, body: "Close with a direct next step, a short reassurance, and the same primary CTA used throughout the page.", cta }
      ];
    }

    function renderSite(site, sections) {
      const cta = site.primaryCTA || site.cta || "Request a Consultation";
      const tags = (site.tags || ["Generated", "Original"]).slice(0, 3);
      return `
        <header class="wrap nav">
          <a class="brand" href="#top"><span class="mark">WS</span><span>${escapeHtml(site.name)}</span></a>
          <nav class="nav-links" aria-label="Generated website navigation">
            <a href="#offer">Offer</a>
            <a href="#proof">Proof</a>
            <a href="#faq">FAQ</a>
            <a class="btn" href="#final">${escapeHtml(cta)}</a>
          </nav>
        </header>

        <main id="top">
          <section class="wrap hero">
            <div>
              <span class="eyebrow">${escapeHtml(site.niche || "Generated")} ${escapeHtml(site.type || "Website")}</span>
              <h1>${escapeHtml(site.headline || site.name)}</h1>
              <p class="lead">${escapeHtml(site.positioningAngle || "An original conversion-focused website generated from Website Storage strategy data.")}</p>
              <div class="hero-actions">
                <a class="btn" href="#final">${escapeHtml(cta)}</a>
                <a class="btn secondary" href="website-storage.html">Back to Storage</a>
              </div>
              <div class="proof-row">
                ${tags.map(tag => `<div class="proof"><strong>${escapeHtml(tag)}</strong><span>Strategy layer included in the saved storage card.</span></div>`).join("")}
              </div>
            </div>
            <aside class="visual" aria-label="Generated funnel visual">
              <div class="journey">
                <div class="journey-card"><span>Source Strategy</span><strong>Layout and funnel logic mirrored at pattern level</strong></div>
                <div class="journey-card"><span>Original Identity</span><strong>New brand, headline, offer, copy, and visual system</strong></div>
                <div class="journey-card"><span>Conversion Framework</span><strong>11 required sections adapted into one working page</strong></div>
                <div class="journey-card"><span>Primary Action</span><strong>${escapeHtml(cta)}</strong></div>
              </div>
            </aside>
          </section>

          <section class="wrap" id="offer">
            <div class="section-head">
              <h2>The full conversion framework is built into this page.</h2>
              <p>${escapeHtml(site.sourceInspiration || "Generated from saved strategy notes. No source brand assets are reused.")}</p>
            </div>
            <div class="framework">
              ${sections.map((section, index) => `
                <article class="block">
                  <span class="num">${String(index + 1).padStart(2, "0")}</span>
                  <div>
                    <span class="label">${escapeHtml(section.title)}</span>
                    <h3>${escapeHtml(section.headline)}</h3>
                    <p>${escapeHtml(section.body)}</p>
                  </div>
                  ${section.cta ? `<a class="btn secondary" href="#final">${escapeHtml(section.cta)}</a>` : `<span class="label">Conversion step</span>`}
                </article>
              `).join("")}
            </div>
          </section>

          <section class="wrap offer" id="proof">
            <div class="panel">
              <span class="label">Offer Positioning</span>
              <h2>${escapeHtml(cta)} without the usual friction.</h2>
              <p class="lead">This generated page gives the visitor enough clarity to act, while keeping the first step small, specific, and low pressure.</p>
              <ul class="list">
                <li>Clear promise above the fold with one primary action.</li>
                <li>Problem, mechanism, proof, risk reversal, and authority in a deliberate order.</li>
                <li>Original copy and brand system, inspired only by strategy patterns.</li>
              </ul>
            </div>
            <aside class="panel">
              <span class="label">Conversion Breakdown</span>
              <h3>What this page is designed to do</h3>
              <ul class="list">
                ${(site.conversionNotes || []).map(note => `<li>${escapeHtml(note)}</li>`).join("") || "<li>Move qualified visitors from interest to action.</li>"}
              </ul>
            </aside>
          </section>

          <section class="wrap" id="faq">
            <div class="section-head">
              <h2>Questions handled before the final CTA.</h2>
              <p>The page reduces hesitation by answering fit, effort, timeline, and next-step concerns before the visitor reaches the end.</p>
            </div>
            <div class="faq">
              <details open><summary>Is this copied from a reference website?</summary><p>No. The reference layer is used for strategy patterns only. This page uses original naming, copy, offer framing, and visual identity.</p></details>
              <details><summary>What happens after the CTA?</summary><p>The visitor expects a focused review, consult, application, or booking step with no unclear handoff.</p></details>
              <details><summary>Can the page be edited?</summary><p>Yes. Use the Edit action in Website Storage to copy a revision brief for Codex.</p></details>
              <details><summary>Where are the notes stored?</summary><p>The Website Storage card keeps source inspiration, design notes, conversion notes, tags, and the section breakdown.</p></details>
            </div>
          </section>

          <section class="wrap" id="final">
            <div class="final">
              <h2>${escapeHtml(sections.at(-1)?.headline || `Ready to move ${site.niche || "visitors"} into action?`)}</h2>
              <p>${escapeHtml(sections.at(-1)?.body || "Take the next step with a clear, low-pressure conversion path.")}</p>
              <div class="hero-actions">
                <a class="btn" href="mailto:hello@example.com?subject=${encodeURIComponent(site.name)}">${escapeHtml(cta)}</a>
                <a class="btn secondary" href="website-storage.html">Return to Website Storage</a>
              </div>
            </div>
          </section>
        </main>
      `;
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#039;"
      }[char]));
    }
  </script>
</body>
</html>
